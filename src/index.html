<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Skate Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/x-icon" href="assets/favicon/favicon.ico" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="assets/favicon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="assets/favicon/favicon-16x16.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="assets/favicon/apple-touch-icon.png"
    />
    <!-- Open Graph -->
    <meta property="og:title" content="skateMap v1.0" />
    <meta
      property="og:description"
      content="Find skate spots across Newcastle and the North East."
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://darling-jelly-5e0580.netlify.app"
    />
    <meta property="og:image" content="/assets/images/og-image.png" />

    <!-- Twitter/X Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="skateMap v1.0" />
    <meta
      name="twitter:description"
      content="Find skate spots across Newcastle and the North East."
    />
    <meta name="twitter:image" content="/assets/images/og-image.png" />
  </head>
  <body>
    <div id="loader">
      <div class="loader-content">
        <div class="loader-emoji">🛹</div>
        <p>Loading spots...</p>
      </div>
    </div>

    <header>
      <div class="header-inner">
        <a id="home-link" href="index.html"><h1>skateMap v1.0</h1></a>
        <button class="burger" id="burger" aria-label="Menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
      <p id="spot-count">North East Skate Spots</p>
      <button id="find-me">Find Me</button>
      <button class="filter-btn" id="filter-btn" aria-label="Filter">
        Filter
      </button>
    </header>
    <div id="filter-panel">
      <button id="filter-close" aria-label="Close filter">✕</button>
      <p class="filter-title">Filter by Type</p>
      <div class="filter-options">
        <button class="filter-option active" data-type="all">🗺️ All</button>
        <button class="filter-option" data-type="ledge">
          <span class="type-dot" style="background: #7b2ff7"></span> Ledge
        </button>
        <button class="filter-option" data-type="stairset">
          <span class="type-dot" style="background: #e63946"></span> Stairset
        </button>
        <button class="filter-option" data-type="bank">
          <span class="type-dot" style="background: #f4a261"></span> Bank
        </button>
        <button class="filter-option" data-type="rail">
          <span class="type-dot" style="background: #00b4d8"></span> Rail
        </button>
        <button class="filter-option" data-type="manual">
          <span class="type-dot" style="background: #2dc653"></span> Manual
        </button>
        <button class="filter-option" data-type="gap">
          <span class="type-dot" style="background: #f5c518"></span> Gap
        </button>
        <button class="filter-option" data-type="skatepark">
          <span class="type-dot" style="background: #ff006e"></span> Skatepark
        </button>
        <button class="filter-option" data-type="diy">
          <span class="type-dot" style="background: #a0522d"></span> DIY
        </button>
      </div>
    </div>

    <nav id="nav-menu">
      <button id="nav-close" aria-label="Close menu">✕</button>
      <a href="index.html">Map</a>
      <a href="about.html">About</a>
    </nav>

    <div id="nav-overlay"></div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="js/app.js"></script>
    <div id="legend">
      <div class="legend-item">
        <span class="legend-dot" style="background: #7b2ff7"></span> Ledge
      </div>
      <div class="legend-item">
        <span class="legend-dot" style="background: #e63946"></span> Stairset
      </div>
      <div class="legend-item">
        <span class="legend-dot" style="background: #f4a261"></span> Bank
      </div>
      <div class="legend-item">
        <span class="legend-dot" style="background: #00b4d8"></span> Rail
      </div>
      <div class="legend-item">
        <span class="legend-dot" style="background: #2dc653"></span> Manual
      </div>
      <div class="legend-item">
        <span class="legend-dot" style="background: #f5c518"></span> Gap
      </div>
      <div class="legend-item">
        <span class="legend-dot" style="background: #ff006e"></span> Skatepark
      </div>
      <div class="legend-item">
        <span class="legend-dot" style="background: #a0522d"></span> DIY
      </div>
    </div>
  </body>
</html>
